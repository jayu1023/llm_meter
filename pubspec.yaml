name: llm_meter
description: >-
  Per-request token cost + latency + cache observability HUD for any Flutter
  LLM app. Drop-in wrapper, live HUD in dev, silent telemetry sink in prod.
version: 0.1.1
homepage: https://github.com/jayu1023/llm_meter
repository: https://github.com/jayu1023/llm_meter
issue_tracker: https://github.com/jayu1023/llm_meter/issues
topics:
  - ai
  - llm
  - observability
  - metrics
  - analytics

screenshots:
  - description: "Live HUD overlaying a streaming chat — total cost, p50/p99 latency, cache-hit %, per-call breakdown."
    path: launch-assets/hud-static.png
  - description: "Close-up of the LlmMeterHud card — model totals and live event count."
    path: launch-assets/hud-zoom.png

environment:
  sdk: ^3.9.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
